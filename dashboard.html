<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Skill-Orbit Dashboard - Track your HTML & CSS learning progress." />
  <title>Dashboard | Skill-Orbit</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <i class="fa-solid fa-circle-nodes"></i> Skill<span>Orbit</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </nav>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-user">
        <div class="user-avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="user-info">
          <span class="user-name">Learner</span>
          <span class="user-xp"><i class="fa-solid fa-bolt"></i> <span id="totalXP">0</span> XP</span>
        </div>
      </div>
      <div class="sidebar-streak">
        <i class="fa-solid fa-fire"></i>
        <span><strong id="streakCount">0</strong> day streak</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">HTML</div>
        <div id="html-sidebar-lessons" class="sidebar-lessons"></div>
        <div class="sidebar-section">CSS</div>
        <div id="css-sidebar-lessons" class="sidebar-lessons"></div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dashboard-header">
        <h1>My Learning Path</h1>
        <p>Keep going! Every lesson brings you closer to building amazing websites.</p>
      </div>

      <!-- Progress Overview -->
      <div class="progress-overview">
        <div class="progress-card">
          <div class="progress-icon html-icon"><i class="fa-brands fa-html5"></i></div>
          <div class="progress-info">
            <h3>HTML Module</h3>
            <div class="progress-bar-wrap">
              <div class="progress-bar" id="htmlProgressBar" style="width: 0%"></div>
            </div>
            <span id="htmlProgressText">0 / 10 lessons</span>
          </div>
        </div>
        <div class="progress-card">
          <div class="progress-icon css-icon"><i class="fa-brands fa-css3-alt"></i></div>
          <div class="progress-info">
            <h3>CSS Module</h3>
            <div class="progress-bar-wrap">
              <div class="progress-bar" id="cssProgressBar" style="width: 0%"></div>
            </div>
            <span id="cssProgressText">0 / 12 lessons</span>
          </div>
        </div>
      </div>

      <!-- Modules -->
      <section class="module-section">
        <h2><i class="fa-brands fa-html5"></i> HTML Module</h2>
        <div class="lesson-cards-grid" id="html-lessons-grid"></div>
      </section>

      <section class="module-section">
        <h2><i class="fa-brands fa-css3-alt"></i> CSS Module</h2>
        <div class="lesson-cards-grid" id="css-lessons-grid"></div>
      </section>

      <!-- Badges Section -->
      <section class="badges-section">
        <h2><i class="fa-solid fa-trophy"></i> Your Badges</h2>
        <div class="badges-grid" id="badges-grid"></div>
      </section>
    </main>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/progress.js"></script>
  <script src="assets/js/lessons.js"></script>
  <script src="assets/js/gamification.js"></script>
  <script>
    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', () => {
      loadDashboard();
    });
  </script>
</body>
</html>
