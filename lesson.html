<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Skill-Orbit Lesson - Interactive HTML & CSS lesson with live code editor." />
  <title>Lesson | Skill-Orbit</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/editor.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Highlight.js for syntax highlighting in theory sections -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
</head>
<body class="lesson-page">

  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>
  <div id="custom-cursor-follower"></div>

  <!-- Top Bar -->
  <header class="lesson-topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="btn btn-icon" title="Back to Dashboard">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <button type="button" class="btn btn-icon lesson-curriculum-toggle" id="lessonSidebarToggle" aria-label="Toggle curriculum sidebar" aria-expanded="true">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="topbar-divider"></div>
      <div class="lesson-title-info">
        <span class="lesson-module-badge" id="lessonModuleBadge">HTML</span>
        <h1 id="lessonTitle">Loading Lesson...</h1>
      </div>
    </div>
    <div class="topbar-right">
      <div class="xp-badge"><i class="fa-solid fa-bolt"></i> <span id="totalXP" class="user-total-xp">0</span> XP</div>
      <div class="topbar-divider"></div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </header>

  <div class="lesson-sidebar-overlay" id="lessonSidebarOverlay" aria-hidden="true"></div>

  <div class="lesson-wrapper">
    <!-- Lesson Sidebar (W3Schools Style) -->
    <aside class="lesson-sidebar" id="lessonSidebar" aria-label="Curriculum">
      <div class="sidebar-header-mini">
        <button type="button" class="sidebar-header-toggle" id="lessonSidebarToggleHeader" aria-label="Toggle curriculum sidebar" aria-expanded="true">
          <i class="fa-solid fa-bars"></i>
        </button>
        <span>Curriculum</span>
      </div>
      <div id="lesson-sidebar-content" class="sidebar-lessons"></div>
    </aside>

    <!-- Lesson Layout: Full Screen Theory -->
    <main class="lesson-theory-container">
      <div class="theory-content-wrapper">
        <div id="theoryBody" class="theory-body">
          <p>Loading lesson content...</p>
        </div>
        <div id="theoryCodeExample" class="theory-code-example" style="display:none;"></div>
        
        <!-- Quiz Section (Appears at the end) -->
        <div id="quizSection" class="quiz-section" style="display: none;">
          <hr class="lesson-divider" />
          <div class="quiz-header">
            <h2><i class="fa-solid fa-clipboard-question"></i> Lesson Quiz</h2>
            <p>Test your knowledge on what you just learned.</p>
          </div>
          <div id="quizContainer">
            <button class="btn btn-primary" id="startQuizBtn">Take Quiz</button>
          </div>
        </div>
      </div>
    </main>

    </div>
  </div>

  <!-- Floating Editor Button -->
  <button class="btn-floating-editor pulse" id="openEditorBtn" aria-label="Open Code Editor">
    <i class="fa-solid fa-code"></i>
    <span class="fab-tooltip">Code Editor</span>
  </button>

  <!-- Editor Overlay -->
  <div class="editor-overlay" id="editorOverlay">
    <div class="editor-overlay-header">
      <button class="btn btn-icon" id="closeEditorBtn" title="Back to Lesson">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="editor-challenge-info">
        <i class="fa-solid fa-dumbbell"></i>
        <span id="challengeText" class="truncate-text">Complete the theory first!</span>
      </div>
      <div class="editor-overlay-actions">
        <button class="btn btn-outline btn-sm" id="hintBtn" title="Show Hint">
          <i class="fa-solid fa-lightbulb"></i> <span class="hide-mobile">Hint</span>
        </button>
        <button class="btn btn-success btn-sm" id="checkBtn">
          <i class="fa-solid fa-check"></i> <span class="hide-mobile">Check Code</span>
        </button>
      </div>
    </div>

    <div class="challenge-hint-box" id="challengeHint" style="display:none;">
      <i class="fa-solid fa-circle-info"></i>
      <span id="hintText"></span>
    </div>
    <div class="challenge-result-box" id="challengeResult" style="display:none;"></div>

    <div class="lesson-editor-panel-full">
      <div class="editor-header">
        <div class="editor-tabs">
          <button class="editor-tab active" id="editorTabHTML">HTML</button>
          <button class="editor-tab" id="editorTabCSS">CSS</button>
        </div>
        <div class="editor-actions">
          <button class="btn btn-icon" id="fontDecreaseBtn" title="Decrease Font Size"><i class="fa-solid fa-minus"></i></button>
          <button class="btn btn-icon" id="fontIncreaseBtn" title="Increase Font Size"><i class="fa-solid fa-plus"></i></button>
          <div class="toolbar-divider"></div>
          <button class="btn btn-icon" id="resetBtn" title="Reset Code">
            <i class="fa-solid fa-rotate-left"></i>
          </button>
          <button class="btn btn-icon" id="runBtn" title="Run Code">
            <i class="fa-solid fa-play"></i>
          </button>
        </div>
      </div>

      <div class="editor-body">
        <div class="code-editor" id="htmlEditorContainer"></div>
        <div class="code-editor hidden" id="cssEditorContainer"></div>
      </div>

      <!-- Draggable Resizer -->
      <div class="editor-resizer" id="editorResizer">
        <div class="resizer-handle"></div>
      </div>

      <div class="preview-panel" id="previewPanel">
        <div class="preview-header">
          <i class="fa-solid fa-eye"></i> Live Preview
          <button class="btn btn-icon" id="refreshPreview" title="Refresh Preview">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
        <iframe id="previewFrame" title="Live Preview" sandbox="allow-scripts"></iframe>
      </div>
    </div>
  </div>

  <!-- Lesson Navigation Footer -->
  <footer class="lesson-footer">
    <div class="footer-left">
      <button class="btn btn-outline" id="prevLessonBtn">
        <i class="fa-solid fa-chevron-left"></i> <span class="hide-mobile">Previous</span>
      </button>
    </div>
    <div class="footer-center">
      <div class="lesson-progress-dots" id="lessonDots"></div>
      <div class="brand-note">Skill-Orbit &copy; 2026 • Interactive Learning</div>
    </div>
    <div class="footer-right">
      <button class="btn btn-primary" id="nextLessonBtn">
        <span class="hide-mobile">Next Lesson</span> <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </footer>

  <!-- XP Toast Notification -->
  <div class="xp-toast" id="xpToast" style="display:none;">
    <i class="fa-solid fa-bolt"></i> <span id="xpToastText">+20 XP Earned!</span>
  </div>

  <canvas id="bg-canvas"></canvas>
  <script src="assets/js/api.js"></script>
  <script src="data/curriculum.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs/loader.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/cursor.js"></script>
  <script src="assets/js/progress.js"></script>
  <script src="assets/js/lessons.js"></script>
  <script src="assets/js/editor.js"></script>
  <script src="assets/js/quiz.js"></script>
  <script src="assets/js/gamification.js"></script>
  <script src="assets/js/visuals.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLessonPage();
    });
  </script>
</body>
</html>
