<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Skill-Orbit Lesson - Interactive HTML & CSS lesson with live code editor." />
  <title>Lesson | Skill-Orbit</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/editor.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Highlight.js for syntax highlighting in theory sections -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
</head>
<body class="lesson-page">

  <!-- Top Bar -->
  <header class="lesson-topbar">
    <a href="dashboard.html" class="btn btn-icon" title="Back to Dashboard">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div class="lesson-title-info">
      <span class="lesson-module-badge" id="lessonModuleBadge">HTML</span>
      <h1 id="lessonTitle">Loading Lesson...</h1>
    </div>
    <div class="topbar-actions">
      <span class="xp-badge"><i class="fa-solid fa-bolt"></i> <span id="lessonXP">0</span> XP</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </header>

  <!-- Lesson Layout: Theory + Editor -->
  <div class="lesson-layout">

    <!-- Left Panel: Theory -->
    <aside class="lesson-theory-panel" id="theoryPanel">
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="theory" id="tabTheory">
          <i class="fa-solid fa-book"></i> Theory
        </button>
        <button class="tab-btn" data-tab="challenge" id="tabChallenge">
          <i class="fa-solid fa-dumbbell"></i> Challenge
        </button>
        <button class="tab-btn" data-tab="quiz" id="tabQuiz">
          <i class="fa-solid fa-question-circle"></i> Quiz
        </button>
      </div>

      <!-- Theory Content -->
      <div class="tab-content active" id="theoryContent">
        <div class="theory-body" id="theoryBody">
          <p>Loading lesson content...</p>
        </div>
        <div class="theory-code-example" id="theoryCodeExample"></div>
        <button class="btn btn-primary" id="tryItBtn">
          <i class="fa-solid fa-play"></i> Try It in Editor
        </button>
      </div>

      <!-- Challenge Content -->
      <div class="tab-content" id="challengeContent">
        <div class="challenge-instruction" id="challengeInstruction">
          <i class="fa-solid fa-lightbulb"></i>
          <p id="challengeText">Complete the theory first!</p>
        </div>
        <div class="challenge-hint" id="challengeHint" style="display:none;">
          <i class="fa-solid fa-circle-info"></i>
          <span id="hintText"></span>
        </div>
        <div class="challenge-actions">
          <button class="btn btn-outline" id="hintBtn">
            <i class="fa-solid fa-lightbulb"></i> Show Hint
          </button>
          <button class="btn btn-success" id="checkBtn">
            <i class="fa-solid fa-check"></i> Check Answer
          </button>
        </div>
        <div class="challenge-result" id="challengeResult" style="display:none;"></div>
      </div>

      <!-- Quiz Content -->
      <div class="tab-content" id="quizContent">
        <div id="quizContainer">
          <p class="quiz-intro">Complete the challenge to unlock the quiz!</p>
        </div>
      </div>
    </aside>

    <!-- Right Panel: Code Editor + Preview -->
    <div class="lesson-editor-panel">
      <div class="editor-header">
        <div class="editor-tabs">
          <button class="editor-tab active" id="editorTabHTML">HTML</button>
          <button class="editor-tab" id="editorTabCSS">CSS</button>
        </div>
        <div class="editor-actions">
          <button class="btn btn-icon" id="resetBtn" title="Reset Code">
            <i class="fa-solid fa-rotate-left"></i>
          </button>
          <button class="btn btn-icon" id="runBtn" title="Run Code">
            <i class="fa-solid fa-play"></i>
          </button>
        </div>
      </div>

      <div class="editor-body">
        <textarea class="code-editor" id="htmlEditor" spellcheck="false" placeholder="<!-- Write your HTML here -->"></textarea>
        <textarea class="code-editor hidden" id="cssEditor" spellcheck="false" placeholder="/* Write your CSS here */"></textarea>
      </div>

      <div class="preview-panel">
        <div class="preview-header">
          <i class="fa-solid fa-eye"></i> Live Preview
          <button class="btn btn-icon" id="refreshPreview" title="Refresh Preview">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
        <iframe id="previewFrame" title="Live Preview" sandbox="allow-scripts"></iframe>
      </div>
    </div>
  </div>

  <!-- Lesson Navigation Footer -->
  <footer class="lesson-footer">
    <button class="btn btn-outline" id="prevLessonBtn">
      <i class="fa-solid fa-chevron-left"></i> Previous
    </button>
    <div class="lesson-progress-dots" id="lessonDots"></div>
    <button class="btn btn-primary" id="nextLessonBtn">
      Next <i class="fa-solid fa-chevron-right"></i>
    </button>
  </footer>

  <!-- XP Toast Notification -->
  <div class="xp-toast" id="xpToast" style="display:none;">
    <i class="fa-solid fa-bolt"></i> <span id="xpToastText">+20 XP Earned!</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/progress.js"></script>
  <script src="assets/js/lessons.js"></script>
  <script src="assets/js/editor.js"></script>
  <script src="assets/js/quiz.js"></script>
  <script src="assets/js/gamification.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLessonPage();
    });
  </script>
</body>
</html>
