<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Skill-Orbit Module - Explore lessons in this course." />
  <title>Course Explorer | Skill-Orbit</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="module-page">

  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>
  <div id="custom-cursor-follower"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <i class="fa-solid fa-circle-nodes"></i> Skill<span>Orbit</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="account.html">Account</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="menu-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-user">
        <div class="user-avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="user-info">
          <span class="user-name">Learner</span>
          <span class="user-xp"><i class="fa-solid fa-bolt"></i> <span id="totalXP">0</span> XP</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section" id="current-module-label">Module</div>
        <div id="module-sidebar-lessons" class="sidebar-lessons"></div>
      </nav>
    </aside>

    <!-- Overlay Backdrop -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="module-main">
      <header class="module-hero" id="module-hero">
        <div class="hero-content-mini">
           <a href="dashboard.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
           <h1 id="module-title">Loading Module...</h1>
           <p id="module-description">Exploring your personalized learning path.</p>
           <div class="module-meta">
              <span id="module-lesson-count"><i class="fa-solid fa-book"></i> 0 Lessons</span>
              <span id="module-completed-count"><i class="fa-solid fa-check-circle"></i> 0 Completed</span>
           </div>
        </div>
        <div class="module-hero-progress">
           <div class="circular-progress-wrap">
              <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path class="circle" id="module-progress-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <text x="18" y="20.35" class="percentage" id="module-progress-text">0%</text>
              </svg>
           </div>
        </div>
      </header>

      <!-- Sections Grid -->
      <section class="module-curriculum">
        <div class="curriculum-header">
           <h2>Curriculum Structure</h2>
           <p>Master each section to complete the course.</p>
        </div>
        <div class="sections-container" id="sections-container">
           <!-- Sections and Lessons will be injected here -->
           <div class="loading-state">
              <i class="fa-solid fa-spinner fa-spin"></i>
              <p>Organizing your lessons...</p>
           </div>
        </div>
      </section>
    </main>
  </div>

  <canvas id="bg-canvas"></canvas>
  <script src="data/curriculum.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/cursor.js"></script>
  <script src="assets/js/progress.js"></script>
  <script src="assets/js/lessons.js"></script>
  <script src="assets/js/gamification.js"></script>
  <script src="assets/js/visuals.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderModulePage();
    });
  </script>
</body>
</html>
